name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck + frontend build
        run: npm run build

      - name: Clippy (deny warnings)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      # `createUpdaterArtifacts` makes `tauri build` sign the updater bundle,
      # which needs a key. CI only validates the build, so mint a THROWAWAY key
      # per run — its signature is never published (real releases sign with the
      # secret key in release.yml). This keeps NSIS/MSI packaging under test
      # without depending on the release secret being set.
      - name: Throwaway updater signing key (CI validation only)
        shell: bash
        run: |
          npm run tauri -- signer generate --ci -p ci -w ci-throwaway.key -f
          # The key file is a single base64 line; $(cat) drops its trailing
          # newline so the value is clean (a stray newline would break base64
          # decoding of the key).
          echo "TAURI_SIGNING_PRIVATE_KEY=$(cat ci-throwaway.key)" >> "$GITHUB_ENV"
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=ci" >> "$GITHUB_ENV"

      - name: Release build (NSIS + MSI bundles)
        run: npm run tauri build

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: refx-desktop-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
